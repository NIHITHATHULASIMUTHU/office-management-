<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee Login | GoalTrack</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="auth-shell">
      <form class="auth-panel login-form" data-login-role="employee">
        <a class="back-link" href="index.html">Back</a>
        <div>
          <p class="eyebrow">Employee</p>
          <h1>Sign in to your goals</h1>
          <p class="muted">Employees can create, attach files, and submit only their own goals.</p>
        </div>
        <label>
          Email
          <input type="email" name="email" value="emma@company.com" required />
        </label>
        <label>
          Password
          <input type="password" name="password" value="password123" required />
        </label>
        <button class="primary-button" type="submit">Login as Employee</button>
        <p class="form-error" role="alert"></p>
      </form>
    </main>
    <script src="app.js"></script>
  </body>
</html>
